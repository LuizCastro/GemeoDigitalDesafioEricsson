server {
    listen 80;
    server_name desafioericsson.mcted.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name desafioericsson.mcted.com.br;

    ssl_certificate     /etc/letsencrypt/live/desafioericsson.mcted.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/desafioericsson.mcted.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Frontend React (Vite dev) ou build estático ──
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── API REST (Express — porta 3000) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (porta 3001) ──
    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Stream MJPEG do Python (porta 3002) ──
    location /stream/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.0;      # BaseHTTPServer usa HTTP/1.0
        proxy_buffering off;         # CRITICO: sem buffer → frames em tempo real
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store";
    }

    # ── Alerta vindo do edge direto (sem prefixo /api) ──
    location /alert {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
